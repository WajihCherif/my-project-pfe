<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card shadow-lg p-4" style="width: 100%; max-width: 450px; border-radius: 1rem;">
    <h3 class="text-center mb-4 fw-bold text-primary">Register</h3>
    <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
    
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label class="form-label fw-medium">Username</label>
        <input type="text" formControlName="username" class="form-control" placeholder="Enter username">
      </div>
      <div class="mb-3">
        <label class="form-label fw-medium">Email</label>
        <input type="email" formControlName="email" class="form-control" placeholder="Enter email">
      </div>
      <div class="mb-3">
        <label class="form-label fw-medium">Password</label>
        <input type="password" formControlName="password" class="form-control" placeholder="Enter password (min 6 chars)">
      </div>
      <div class="mb-4">
        <label class="form-label fw-medium">Role</label>
        <select formControlName="role" class="form-select">
          <option value="manager">Manager</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary w-100 fw-bold py-2 mb-3" [disabled]="loading || registerForm.invalid">
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
        Register
      </button>
    </form>
    <div class="text-center mt-2">
      <small>Already have an account? <a routerLink="/login" class="text-decoration-none fw-bold">Login here</a></small>
    </div>
  </div>
</div>
