<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card shadow-lg p-4" style="width: 100%; max-width: 400px; border-radius: 1rem;">
    <h3 class="text-center mb-4 fw-bold text-primary">Login</h3>
    <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
    
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label class="form-label fw-medium">Username</label>
        <input type="text" formControlName="username" class="form-control" placeholder="Enter username">
      </div>
      <div class="mb-4">
        <label class="form-label fw-medium">Password</label>
        <input type="password" formControlName="password" class="form-control" placeholder="Enter password">
      </div>
      <button type="submit" class="btn btn-primary w-100 fw-bold py-2 mb-3" [disabled]="loading || loginForm.invalid">
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
        Login
      </button>
    </form>
    <div class="text-center mt-2">
      <small>Don't have an account? <a routerLink="/register" class="text-decoration-none fw-bold">Register here</a></small>
    </div>
  </div>
</div>
