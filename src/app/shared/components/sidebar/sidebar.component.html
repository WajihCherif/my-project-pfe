<div class="sidebar-wrapper d-flex flex-column shadow-lg">
  <!-- HEADER / LOGO -->
  <div class="sidebar-header p-4 d-flex align-items-center gap-3">
    <div class="logo-box d-flex align-items-center justify-content-center shadow-sm">
      <i class="bi bi-shield-shaded text-white fs-4"></i>
    </div>
    <div class="brand-text">
      <div class="fw-bold fs-5 text-white lh-sm">Stock</div>
      <div class="fw-bold fs-5 text-white lh-sm">Monitoring</div>
    </div>
  </div>

  <hr class="mx-4 border-light opacity-10 my-0">

  <!-- NAVIGATION -->
  <ul class="nav nav-pills flex-column mb-auto p-3 mt-2 gap-1 custom-nav">
    <li class="nav-item">
      <a routerLink="/home" routerLinkActive="active" class="nav-link d-flex align-items-center gap-3">
        <i class="bi bi-house-door fs-5"></i>
        <span>Home</span>
      </a>
    </li>
    <li>
      <a routerLink="/live-camera" routerLinkActive="active" class="nav-link d-flex align-items-center gap-3">
        <i class="bi bi-camera-video fs-5"></i>
        <span>Live Camera</span>
      </a>
    </li>
    <li>
      <a routerLink="/stock" routerLinkActive="active" class="nav-link d-flex align-items-center gap-3">
        <i class="bi bi-box-seam fs-5"></i>
        <span>Stock</span>
      </a>
    </li>
    <li>
      <a routerLink="/etat" routerLinkActive="active" class="nav-link d-flex align-items-center gap-3">
        <i class="bi bi-hourglass-split fs-5"></i>
        <span>État</span>
      </a>
    </li>
    <li>
      <a routerLink="/alerts" routerLinkActive="active" class="nav-link d-flex align-items-center justify-content-between">
        <div class="d-flex align-items-center gap-3">
          <i class="bi bi-bell fs-5"></i>
          <span>Alerts</span>
        </div>
        <span class="badge rounded-circle bg-danger alert-badge" *ngIf="alertCount > 0">{{ alertCount }}</span>
      </a>
    </li>
    <li>
      <a routerLink="/account" routerLinkActive="active" class="nav-link d-flex align-items-center gap-3">
        <i class="bi bi-person fs-5"></i>
        <span>Account</span>
      </a>
    </li>
  </ul>

  <!-- FOOTER / LOGOUT -->
  <div class="sidebar-footer p-3">
    <button class="btn btn-logout w-100 d-flex align-items-center justify-content-center gap-2 rounded-3 py-2 shadow-sm" (click)="logout()">
      <i class="bi bi-power"></i>
      <span class="fw-bold">Logout</span>
    </button>
  </div>
</div>
