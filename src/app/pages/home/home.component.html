<div class="home-dashboard py-4 px-md-4">
  <div class="d-flex align-items-center mb-5">
    <div class="fs-2 fw-bolder text-gradient me-3"><i class="bi bi-house-door-fill me-2"></i>Vue d'ensemble</div>
  </div>

  <div class="row g-4 mb-5">
    <div class="col-12 col-md-8 mx-auto">
      <div class="search-box position-relative w-100 shadow-sm rounded-pill overflow-hidden">
        <i class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-4 text-primary fs-5"></i>
        <input type="text" class="form-control form-control-lg border-0 ps-5 bg-white bg-opacity-75 py-3" placeholder="Rechercher rapidement un produit de votre stock...">
      </div>
    </div>
  </div>

  <div class="row g-4 mb-5">
    <div class="col-12">
      <div class="d-flex flex-column flex-md-row gap-4 justify-content-center">
        <button class="btn btn-primary d-flex align-items-center justify-content-between p-4 rounded-4 shadow-lg border-0 bg-gradient-primary flex-grow-1 action-hero-btn" (click)="router.navigate(['/stock'])">
          <div class="d-flex align-items-center gap-3">
            <div class="icon-circle bg-white bg-opacity-25 text-white fs-3"><i class="bi bi-box-seam"></i></div>
            <div class="text-start">
              <div class="fs-5 fw-bold text-white mb-1">Gérer le Catalogue</div>
              <div class="text-white-50 small">Total de {{ totalProducts }} produits enregistrés</div>
            </div>
          </div>
          <i class="bi bi-chevron-right text-white opacity-50 fs-4"></i>
        </button>
        
        <button class="btn btn-danger d-flex align-items-center justify-content-between p-4 rounded-4 shadow-lg border-0 bg-gradient-danger flex-grow-1 action-hero-btn" (click)="router.navigate(['/alerts'])">
          <div class="d-flex align-items-center gap-3">
            <div class="icon-circle bg-white bg-opacity-25 text-white fs-3"><i class="bi bi-exclamation-triangle-fill"></i></div>
            <div class="text-start">
              <div class="fs-5 fw-bold text-white mb-1">Alertes Système</div>
              <div class="text-white-50 small">{{ problems.length }} problèmes détectés</div>
            </div>
          </div>
          <i class="bi bi-chevron-right text-white opacity-50 fs-4"></i>
        </button>
      </div>
    </div>
  </div>

  <div class="row g-4 mb-5">
    <div class="col-md-3">
      <div class="card kpi-card bg-glass border-0 shadow-sm rounded-4 h-100 p-4 text-center">
        <div class="d-inline-flex align-items-center justify-content-center bg-success bg-opacity-10 text-success rounded-circle mb-3 mx-auto" style="width: 60px; height: 60px;">
          <i class="bi bi-check-circle-fill fs-2"></i>
        </div>
        <div class="text-dark fw-bold mb-1">ON SHELF</div>
        <div class="fs-1 fw-bolder text-success">21</div>
        <div class="text-muted small mt-1">Produits détectés en rayon</div>
      </div>
    </div>
    
    <div class="col-md-3">
      <div class="card kpi-card bg-glass border-0 shadow-sm rounded-4 h-100 p-4 text-center">
        <div class="d-inline-flex align-items-center justify-content-center bg-warning bg-opacity-10 text-warning rounded-circle mb-3 mx-auto" style="width: 60px; height: 60px;">
          <i class="bi bi-hourglass-split fs-2"></i>
        </div>
        <div class="text-dark fw-bold mb-1">TEMP REMOVED</div>
        <div class="fs-1 fw-bolder text-warning">1</div>
        <div class="text-muted small mt-1">En cours d'inspection</div>
      </div>
    </div>
    
    <div class="col-md-3">
      <div class="card kpi-card bg-glass border-0 shadow-sm rounded-4 h-100 p-4 text-center">
        <div class="d-inline-flex align-items-center justify-content-center bg-danger bg-opacity-10 text-danger rounded-circle mb-3 mx-auto" style="width: 60px; height: 60px;">
          <i class="bi bi-x-circle-fill fs-2"></i>
        </div>
        <div class="text-dark fw-bold mb-1">REMOVED</div>
        <div class="fs-1 fw-bolder text-danger">1</div>
        <div class="text-muted small mt-1">Absents / Vol potentiel</div>
      </div>
    </div>
    
    <div class="col-md-3">
      <div class="card kpi-card bg-glass border-0 shadow-sm rounded-4 h-100 p-4 text-center">
        <div class="d-inline-flex align-items-center justify-content-center bg-primary bg-opacity-10 text-primary rounded-circle mb-3 mx-auto" style="width: 60px; height: 60px;">
          <i class="bi bi-boxes fs-2"></i>
        </div>
        <div class="text-dark fw-bold mb-1">TOTAL THÉORIQUE</div>
        <div class="fs-1 fw-bolder text-primary">{{ totalProducts }}</div>
        <div class="text-muted small mt-1">Inventaire total enregistré</div>
      </div>
    </div>
  </div>

  <div class="row g-4">
    <div class="col-lg-12">
      <div class="card bg-glass border-0 shadow-sm rounded-4 overflow-hidden">
        <div class="card-header bg-white border-0 p-4 d-flex justify-content-between align-items-center">
          <h5 class="fw-bold mb-0 text-dark"><i class="bi bi-camera-video text-primary me-2"></i>Flux de détection en direct (Mock)</h5>
        </div>
        <div class="table-responsive p-0 pb-2">
          <table class="table table-hover align-middle mb-0 custom-table">
            <thead class="text-muted small text-uppercase bg-light">
              <tr>
                <th class="ps-4">Article</th>
                <th>Statut Caméra</th>
                <th>Quantité Vue</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let p of liveStatuses">
                <td class="ps-4 fw-bold">{{ p.name }}</td>
                <td>
                  <span class="badge rounded-pill px-3 py-2 border" 
                        [ngClass]="p.cls === 'on' ? 'bg-success bg-opacity-10 text-success border-success' : p.cls === 'tmp' ? 'bg-warning bg-opacity-10 text-warning border-warning' : 'bg-danger bg-opacity-10 text-danger border-danger'">
                    <i class="bi" [ngClass]="p.cls === 'on' ? 'bi-check-circle-fill' : p.cls === 'tmp' ? 'bi-exclamation-circle-fill' : 'bi-x-circle-fill'"></i>
                    {{ p.status }}
                  </span>
                </td>
                <td><span class="fw-bold fs-5">{{ p.qty }}</span></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
