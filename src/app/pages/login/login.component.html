<div class="auth-page d-flex align-items-center justify-content-center min-vh-100 py-5">
  <div class="card auth-card shadow-sm border-0">
    <div class="card-body p-5">
      <h1 class="h3 mb-3 fw-bold text-center">Connexion</h1>
      <p class="text-muted text-center mb-4">Connectez-vous avec votre compte utilisateur.</p>

      <form (ngSubmit)="onSubmit()" class="needs-validation" novalidate>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" [(ngModel)]="email" name="email" required autocomplete="username" />
        </div>

        <div class="mb-4">
          <label class="form-label">Mot de passe</label>
          <input type="password" class="form-control" [(ngModel)]="mot_de_passe" name="mot_de_passe" required autocomplete="current-password" />
        </div>

        <button type="submit" class="btn btn-primary w-100 mb-3" [disabled]="loading">
          {{ loading ? 'Connexion...' : 'Se connecter' }}
        </button>

        <div *ngIf="error" class="alert alert-danger py-2 mb-3">{{ error }}</div>

        <div class="text-center text-muted">
          Pas encore de compte ? <a routerLink="/signup">Inscrivez-vous</a>
        </div>
      </form>
    </div>
  </div>
</div>
