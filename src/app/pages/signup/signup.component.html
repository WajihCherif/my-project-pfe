<div class="auth-page px-3 d-flex align-items-center justify-content-center min-vh-100">
  <div class="container">
    <div class="row justify-content-center">
      
      <!-- ── REGISTRATION FORM ── -->
      <div class="col-lg-5 col-md-7">
        <div class="card auth-card shadow-sm border-0">
          <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
              <div class="auth-icon-wrap bg-primary bg-opacity-10 text-primary rounded-circle mx-auto mb-3 d-flex align-items-center justify-content-center" style="width: 60px; height: 60px;">
                <i class="bi bi-person-plus-fill fs-3"></i>
              </div>
              <h1 class="h3 fw-bold text-gradient">Créer un Compte</h1>
              <p class="text-muted">Rejoignez notre équipe pour gérer le stock avec précision.</p>
            </div>

            <form (ngSubmit)="onSubmit()" class="needs-validation" novalidate>
              <div class="row g-3 mb-3">
                <div class="col-12 col-md-6">
                  <label class="form-label fw-semibold small">Nom</label>
                  <input type="text" class="form-control shadow-none" [(ngModel)]="nom" name="nom" placeholder="Doe" required />
                </div>
                <div class="col-12 col-md-6">
                  <label class="form-label fw-semibold small">Prénom</label>
                  <input type="text" class="form-control shadow-none" [(ngModel)]="prenom" name="prenom" placeholder="John" required />
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold small">Email Professionnel</label>
                <input type="email" class="form-control shadow-none" [(ngModel)]="email" name="email" placeholder="john.doe@company.com" required />
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold small">Type de Compte</label>
                <select class="form-select shadow-none" [(ngModel)]="role" name="role" required>
                  <option value="user">Utilisateur standard</option>
                  <option value="admin">Administrateur</option>
                </select>
              </div>

              <div class="mb-4">
                <label class="form-label fw-semibold small">Mot de passe</label>
                <input type="password" class="form-control shadow-none" [(ngModel)]="mot_de_passe" name="mot_de_passe" placeholder="••••••••" required />
              </div>

              <button type="submit" class="btn btn-primary w-100 mb-3 shadow-sm py-2" [disabled]="loading">
                <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                {{ loading ? 'Enregistrement...' : 'Créer le Profil' }}
              </button>

              <div *ngIf="error" class="alert alert-danger py-2 mb-3 border-0 small shadow-sm d-flex align-items-center gap-2">
                <i class="bi bi-exclamation-triangle-fill"></i> {{ error }}
              </div>

              <div class="text-center text-muted small">
                Vous avez déjà un compte ? <a routerLink="/login" class="text-primary fw-bold text-decoration-none">Se connecter</a>
              </div>
            </form>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
